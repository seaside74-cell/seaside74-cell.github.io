<!DOCTYPE html>
<html>
<head>
    <title>테슬라 연동 중...</title>
    <script>
        window.onload = function() {
            // URL에서 테슬라가 보내준 'code' 파라미터를 추출합니다.
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                // 앱으로 강제 이동 (mote://auth?code=...)
                window.location.href = "mote://auth?code=" + code;
                
                // 만약 자동으로 이동하지 않을 경우를 대비해 1초 후 메시지 표시
                setTimeout(function() {
                    document.body.innerHTML = "<h3>앱이 자동으로 열리지 않으면 아래 링크를 클릭하세요.</h3>" +
                                            "<a href='mote://auth?code=" + code + "' style='font-size:20px;'>앱으로 돌아가기</a>";
                }, 1000);
            } else {
                document.body.innerHTML = "인증 코드를 찾을 수 없습니다.";
            }
        };
    </script>
</head>
<body>
    <p>테슬라 인증을 완료하고 앱으로 돌아가는 중입니다...</p>
</body>
</html>
