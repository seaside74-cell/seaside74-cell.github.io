<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>테슬라 연동 중...</title>
    <script>
        window.onload = function() {
            // 1. 모든 경로에서 'code' 파라미터를 찾습니다.
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('code');
            
            // 2. 만약 # 뒤에 코드가 붙어있을 경우도 대비합니다.
            if (!code && window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                code = hashParams.get('code');
            }
            
            if (code) {
                // 앱 실행 시도 (mote://auth?code=...)
                const appUrl = "mote://auth?code=" + code;
                window.location.href = appUrl;
                
                // 자동으로 이동하지 않을 경우를 대비한 수동 링크 표시
                document.body.innerHTML = `
                    <div style="text-align:center; margin-top:50px; font-family:sans-serif;">
                        <h2>인증 정보를 성공적으로 받았습니다!</h2>
                        <p>앱이 자동으로 열리지 않으면 아래 버튼을 눌러주세요.</p>
                        <br>
                        <a href="${appUrl}" style="display:inline-block; padding:15px 25px; background-color:#E82127; color:white; text-decoration:none; border-radius:5px; font-weight:bold;">앱으로 돌아가기</a>
                    </div>
                `;
            } else {
                // 디버깅을 위해 현재 URL 상태를 보여줍니다.
                document.body.innerHTML = `
                    <div style="text-align:center; margin-top:50px;">
                        <h3>인증 코드를 찾을 수 없습니다.</h3>
                        <p>현재 주소: ${window.location.href}</p>
                        <p>테슬라 로그인 과정에서 오류가 발생했는지 확인해 주세요.</p>
                    </div>
                `;
            }
        };
    </script>
</head>
<body>
    <p style="text-align:center; margin-top:50px;">테슬라 인증 정보를 확인하는 중입니다...</p>
</body>
</html>
